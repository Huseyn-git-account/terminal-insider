<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Terminal Insider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--card:#141929;--card-border:#1e2a3a;--accent:#4f9eff;--accent-hover:#3a8aee;--warning:#ff4d4d;--pro:#00c896;--info:#ffd166;--text:#e8edf5;--text-secondary:#8892a8;--text-muted:#5a6480;--nav-bg:#0d1224;--nav-border:#1a2440;--radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(0,0,0,0.3);--font:'Instrument Sans',-apple-system,BlinkMacSystemFont,sans-serif;--safe-bottom:env(safe-area-inset-bottom,0px)}
html{height:100%;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;padding-bottom:calc(72px + var(--safe-bottom))}
#app{max-width:480px;margin:0 auto;position:relative;min-height:100vh;min-height:100dvh}
#header{position:sticky;top:0;z-index:100;padding:16px 16px 8px;background:var(--bg);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px}
#header-title{font-size:22px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
#header-title span{color:var(--accent)}
#header-controls{display:flex;align-items:center;gap:4px}
.ctrl-btn{background:none;border:none;color:var(--text-secondary);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:background .2s,color .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ctrl-btn:active{background:var(--card)}
.ctrl-btn.active{color:var(--accent)}
.lang-switch{background:var(--card);border:1px solid var(--card-border);border-radius:20px;padding:4px;display:flex;gap:2px}
.lang-btn{background:none;border:none;color:var(--text-secondary);padding:4px 10px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:var(--font)}
.lang-btn.active{background:var(--accent);color:#fff}
.sound-btn{font-size:18px}
#search-bar{padding:0 16px 12px;position:sticky;top:0;z-index:99;background:var(--bg)}
#search-input{width:100%;padding:12px 16px 12px 44px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:border-color .2s}
#search-input:focus{border-color:var(--accent)}
#search-input::placeholder{color:var(--text-muted)}
#search-bar{position:relative}
#search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:18px}
.screen{display:none;padding:0 16px 16px;animation:fadeIn .25s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOutLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-40px)}}
@keyframes bounceIn{0%{opacity:0;transform:scale(0.9)}60%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
@keyframes heartbeat{0%{transform:scale(1)}25%{transform:scale(1.3)}50%{transform:scale(1)}75%{transform:scale(1.15)}100%{transform:scale(1)}}
.screen-exit{animation:slideOutLeft .2s ease forwards}
.screen-enter{animation:slideInRight .25s ease forwards}
#continent-filter{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none;-ms-overflow-style:none;-webkit-overflow-scrolling:touch}
#continent-filter::-webkit-scrollbar{display:none}
.continent-chip{flex-shrink:0;padding:8px 16px;border-radius:20px;background:var(--card);border:1px solid var(--card-border);color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:var(--font)}
.continent-chip:active{transform:scale(.96)}
.continent-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#airport-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-bottom:16px}
.airport-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
.airport-card:active{transform:scale(.97)}
.airport-card .flag{font-size:28px;line-height:1}
.airport-card .code{font-size:20px;font-weight:700;color:var(--text);letter-spacing:1px}
.airport-card .city{font-size:13px;color:var(--text-secondary);font-weight:500}
.airport-card .country{font-size:12px;color:var(--text-muted)}
.airport-card .meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.stress-dots{display:flex;gap:3px}
.stress-dot{width:6px;height:6px;border-radius:50%;background:var(--card-border)}
.stress-dot.filled{background:var(--warning)}
.stress-dot.filled.easy{background:var(--pro)}
.stress-dot.filled.medium{background:var(--info)}
.stress-dot.filled.hard{background:var(--warning)}
.tip-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
#airport-header{display:flex;align-items:center;gap:12px;padding:8px 0 12px}
#back-btn{background:none;border:none;color:var(--text-secondary);font-size:24px;cursor:pointer;padding:4px;display:flex;transition:color .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#back-btn:active{color:var(--text)}
#airport-hero{margin:0 -16px 16px;padding:24px 16px;background:linear-gradient(180deg,var(--card),transparent);border-bottom:1px solid var(--card-border);display:flex;flex-direction:column;gap:4px}
#airport-hero .flag{font-size:48px}
#airport-hero .code{font-size:36px;font-weight:700;letter-spacing:2px}
#airport-hero .location{font-size:15px;color:var(--text-secondary)}
#airport-hero .quick-info{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.quick-chip{padding:6px 12px;border-radius:8px;background:var(--card);border:1px solid var(--card-border);font-size:12px;color:var(--text-secondary);font-weight:500}
#category-filter{display:flex;gap:8px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none;-ms-overflow-style:none;-webkit-overflow-scrolling:touch;position:sticky;top:0;z-index:10;background:var(--bg);margin:0 -16px;padding:0 16px 12px}
#category-filter::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:7px 14px;border-radius:16px;background:var(--card);border:1px solid var(--card-border);color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:var(--font)}
.cat-chip:active{transform:scale(.96)}
.cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#tips-list{display:flex;flex-direction:column;gap:12px;padding-bottom:24px}
.tip-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;transition:all .2s;animation:fadeIn .3s ease forwards;opacity:0}
.tip-card.show{opacity:1}
.tip-card .severity-bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.tip-card .severity-bar.warning{background:var(--warning)}
.tip-card .severity-bar.pro{background:var(--pro)}
.tip-card .severity-bar.info{background:var(--info)}
.tip-card .tip-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tip-card .tip-category{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px}
.tip-card .tip-category .icon{font-size:14px}
.tip-card .save-btn{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:6px;transition:color .2s;line-height:1;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tip-card .save-btn:active{transform:scale(1.2)}
.tip-card .save-btn.saved{color:var(--warning)}
.tip-card .save-btn.animate{animation:heartbeat .4s ease}
.tip-card .tip-text{font-size:15px;line-height:1.6;color:var(--text);padding-right:8px}
.tip-card .tip-text.expandable{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer}
.tip-card .tip-text.expanded{-webkit-line-clamp:unset}
.tip-card .tip-expand-hint{color:var(--accent);font-size:12px;margin-top:4px;cursor:pointer;background:none;border:none;font-family:var(--font);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#search-screen .search-header{display:flex;align-items:center;gap:8px;padding-bottom:12px}
#search-screen #search-input-lg{flex:1;padding:12px 16px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:border-color .2s}
#search-screen #search-input-lg:focus{border-color:var(--accent)}
#search-screen #search-input-lg::placeholder{color:var(--text-muted)}
#search-cancel-btn{background:none;border:none;color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.search-section-title{font-size:14px;font-weight:600;color:var(--text-secondary);padding:8px 0;text-transform:uppercase;letter-spacing:.5px}
.search-result-item{padding:12px 0;border-bottom:1px solid var(--card-border);cursor:pointer;transition:background .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.search-result-item:active{background:var(--card);margin:0 -16px;padding:12px 16px;border-radius:var(--radius-sm)}
.search-result-item .result-title{font-size:15px;font-weight:600;color:var(--text)}
.search-result-item .result-sub{font-size:13px;color:var(--text-muted);margin-top:2px}
.search-result-item .result-preview{font-size:13px;color:var(--text-secondary);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
#popular-searches{display:flex;gap:8px;flex-wrap:wrap;padding:8px 0}
.popular-tag{padding:6px 14px;border-radius:14px;background:var(--card);border:1px solid var(--card-border);color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:var(--font)}
.popular-tag:active{background:var(--accent);color:#fff}
#search-results{padding-top:8px}
#saved-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
#saved-header h2{font-size:20px;font-weight:700}
#clear-saved-btn{background:none;border:none;color:var(--warning);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#saved-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:12px}
#saved-empty .icon{font-size:64px;opacity:.3}
#saved-empty h3{font-size:18px;color:var(--text-secondary)}
#saved-empty p{font-size:14px;color:var(--text-muted);max-width:260px}
.saved-group{margin-bottom:16px}
.saved-group-title{font-size:13px;font-weight:600;color:var(--accent);padding:8px 0 4px}
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(64px + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--nav-bg);border-top:1px solid var(--nav-border);display:flex;align-items:center;justify-content:space-around;z-index:200;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);max-width:480px;margin:0 auto}
.nav-item{background:none;border:none;color:var(--text-muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 12px;cursor:pointer;transition:color .2s;position:relative;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:48px;font-family:var(--font)}
.nav-item .nav-icon{font-size:22px;line-height:1}
.nav-item .nav-label{font-size:10px;font-weight:500}
.nav-item.active{color:var(--accent)}
.nav-item.active::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:24px;height:3px;border-radius:2px;background:var(--accent);animation:fadeIn .2s ease}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card-border) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s ease infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{height:120px;margin-bottom:12px}
#disclaimer{padding:24px 16px 16px;text-align:center;border-top:1px solid var(--card-border);margin-top:16px}
#disclaimer p{font-size:12px;color:var(--text-muted);line-height:1.5}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:2px}
@media(min-width:768px){#app{max-width:600px}#airport-grid{grid-template-columns:1fr 1fr 1fr}.airport-card{padding:20px}.airport-card .code{font-size:22px}}
@media(min-width:1024px){#app{max-width:720px}#airport-grid{grid-template-columns:1fr 1fr 1fr}}
</style></head>

{category:'transport',severity:'info',text_en:'AirTrain JFK to Jamaica Station then subway is ~$8 total to Manhattan. Takes 50-70min but reliable. Leave extra time nights/weekends when subway runs less frequently.',text_ru:'AirTrain JFK до станции Jamaica, затем метро — ~$8 до Манхэттена. Занимает 50–70 минут, но надёжно. Добавьте запас времени ночью и в выходные, когда метро ходит реже.'},
{category:'money',severity:'warning',text_en:'Currency exchange booths in arrivals have terrible rates (up to 15% markup). Walk to a Travelex in departures or use the ATMs after baggage claim — they give much better rates.',text_ru:'Обменники в зоне прилёта грабительские (наценка до 15%). Идите в Travelex в зоне вылета или используйте банкоматы после выдачи багажа — курс значительно лучше.'},
{category:'wifi',severity:'info',text_en:'Free WiFi "BOOST-WiFi" with a 30-min ad-supported session. For unlimited free WiFi, use the "Free unlimited WiFi" terminal — select the option to watch a 30s ad. Speed is decent (20 Mbps).',text_ru:'Бесплатный WiFi «BOOST-WiFi» — сессия 30 минут с рекламой. Для безлимита используйте «Free unlimited WiFi» — посмотрите 30-секундную рекламу. Скорость приличная (20 Мбит/с).'},
{category:'charging',severity:'info',text_en:'Charging stations are at most gates but crowded. Best spots: T4 near Shake Shack (long counter with outlets), T5 near gate 12 (power outlets between seats). Pack a multi-port charger — outlets are scarce at peak hours.',text_ru:'Зарядные станции есть у большинства выходов, но всегда заняты. Лучшие места: T4 у Shake Shack (длинная стойка с розетками), T5 у выхода 12 (розетки между креслами). Берите многопортовое зарядное — розеток не хватает в часы пик.'},
{category:'food',severity:'pro',text_en:'Cheapest decent meal: T4 food court has "Nathans Famous" — hot dog + fries ~$10. T5 has "Gotham Market" — slices from $5. Avoid sit-down restaurants near gates (minimum $25/plate).',text_ru:'Лучший бюджетный вариант: фуд-корт T4 — «Nathans Famous»: хот-дог с картошкой ~$10. T5 — «Gotham Market»: пицца от $5. Избегайте ресторанов у выходов — минимум $25 за блюдо.'},
{category:'sleep',severity:'info',text_en:'No free sleeping pods. Best spots: T4 near gate B24 (quiet, padded benches, dim lighting), T5 upper level (less foot traffic). Bring eye mask and earplugs.',text_ru:'Бесплатных капсул для сна нет. Лучшие места: T4 у выхода B24 (тихо, мягкие скамьи), T5 верхний уровень. Возьмите маску и беруши.'},
{category:'luggage',severity:'info',text_en:'Luggage storage: "SMARTEC" in T1 arrivals — $12 per bag for 24h, $8 for 6h. T4 has "Baggage Storage" near baggage claim D — $10/bag/24h.',text_ru:'Хранение багажа: «SMARTEC» в T1 — $12 за сумку на 24ч. T4 — хранение у выдачи багажа D — $10/сумка/24ч.'},
{category:'scams',severity:'warning',text_en:'Classic JFK scam: someone in uniform claims your taxi payment machine is broken and directs you to a fake cab. REAL taxis accept all cards.',text_ru:'Классическая схема в JFK: человек в форме утверждает, что терминал оплаты такси сломан, и направляет к подставному такси. Настоящие такси принимают все карты.'},
{category:'immigration',severity:'warning',text_en:'Immigration at JFK can take 45-90 minutes. Use Mobile Passport Control app (free) or Global Entry. Arriving on morning international flights (5-9am) has shortest waits.',text_ru:'Паспортный контроль JFK — от 45 до 90 минут. Используйте приложение Mobile Passport Control (бесплатно) или Global Entry. Утренние рейсы (5–9 утра) — самые короткие очереди.'},
{category:'navigation',severity:'info',text_en:'JFK has 6 terminals connected by AirTrain (free within airport). T4 is the main hub. Walking between T4 and T5 takes ~15 min via skywalk.',text_ru:'JFK — 6 терминалов, соединённых AirTrain (бесплатно). T4 — главный хаб. Пешком между T4 и T5 ~15 минут.'},
{category:'sim',severity:'info',text_en:'SIM cards: "T-Mobile" kiosk in arrivals T4 (prepaid from $30 for 10GB). "AT&T" in T1. Walk 5min to Lefferts Blvd for half the price. Airalo e-sim works well.',text_ru:'SIM-карты: киоск T-Mobile в T4 (prepaid от $30 за 10 ГБ). AT&T в T1. Пройдите 5 минут до Lefferts Blvd — цена вдвое ниже. e-Sim Airalo работает отлично.'},
{category:'sleep',severity:'pro',text_en:'Best budget sleep: TWA Hotel at JFK (T5) — rooms from $249. Free: the chapel in T4 (near baggage claim, room 1A) is open to all faiths, quiet, dimly lit.',text_ru:'Лучший вариант: TWA Hotel у JFK — от $249. Бесплатно: часовня в T4 (у выдачи багажа, комната 1A), тихо, приглушённый свет.'},
]},
{code:'LAX',city:'Los Angeles',country:'USA',countryRu:'США',flag:'🇺🇸',terminals:9,difficulty:5,continent:'americas',tips:[

{category:'food',severity:'pro',text_en:'Cheapest real food: In-N-Out on Sepulveda Blvd (5 min walk from T1 arrivals) — double-double combo ~$10.',text_ru:'In-N-Out на Sepulveda Blvd (5 мин пешком от T1) — дабл-дабл комбо ~$10.'},
{category:'sleep',severity:'info',text_en:'LAX has no sleep pods. Best free spots: T4 near gate 46 (quiet, padded benches). Many travelers sleep at TBIT gate 125.',text_ru:'В LAX нет капсул. Лучшие места: T4 у выхода 46 (мягкие скамьи). Многие спят у выхода 125 в TBIT.'},
{category:'luggage',severity:'info',text_en:'SmarteCarte at T1 and T4 arrivals — $10/bag/24h. Luggage Club near TBIT — $12/bag/24h.',text_ru:'SmarteCarte в T1 и T4 — $10/сумка/24ч. Luggage Club у TBIT — $12/сумка/24ч.'},
{category:'scams',severity:'warning',text_en:'Common LAX scam: people posing as "airport ambassadors" offering help with bags then demanding $20. Real staff wear official badges.',text_ru:'Люди в форме «послов аэропорта» предлагают помощь с багажом, затем требуют $20. Настоящие сотрудники в бейджах.'},
{category:'immigration',severity:'warning',text_en:'LAX immigration wait times often exceed 90 minutes during peak (11am-8pm). Use Mobile Passport Control (free) or Global Entry.',text_ru:'Очереди в LAX часто превышают 90 минут в пик (11:00–20:00). Используйте Mobile Passport Control или Global Entry.'},
{category:'navigation',severity:'warning',text_en:'LAX terminals NOT connected airside. You MUST exit and take shuttle bus between terminals — 30-45 min including re-security.',text_ru:'Терминалы LAX НЕ соединены внутри. Выходите и езжайте на шаттле — 30–45 минут с повторным досмотром.'},
{category:'sim',severity:'info',text_en:'T-Mobile and AT&T kiosks at TBIT arrivals. Prepaid from $30. FlyAway to Union Station ($9.75) then buy downtown — plans from $15/mo.',text_ru:'Киоски T-Mobile и AT&T у TBIT. Prepaid от $30. FlyAway до Union Station ($9.75) — тарифы от $15/мес.'},

{category:'luggage',severity:'info',text_en:'Luggage storage in T-A arrivals — ZAR 50-80/bag/24h ($3-5). T-B also available. Very cheap. Lockers ZAR 40-60.',text_ru:'Хранение в T-A — 50–80 рандов/сумка/24ч. Очень дёшево.'},
{category:'scams',severity:'warning',text_en:'JNB is known for baggage theft — lock your luggage. Unofficial taxi drivers target tourists. "Helpful" porters demanding ZAR 100. Be alert.',text_ru:'JNB — кражи багажа. Запирайте чемоданы. Неофициальные такси.'},

{category:'navigation',severity:'info',text_en:'JNB has T-A (international) and T-B (domestic) connected by walkway (10 min) and free shuttle. Central terminal building has shops and restaurants.',text_ru:'JNB: T-A (международные) и T-B (внутренние). Переход (10 мин).'},
]},
{code:'CAI',city:'Cairo International',country:'Egypt',countryRu:'Египет',flag:'🇪🇬',terminals:3,difficulty:4,continent:'africa-oceania',tips:[

{category:'transport',severity:'warning',text_en:'DO NOT take white taxis inside airport — they charge 5x. Walk to the parking lot and use Uber/Careem for fair prices and safety.',text_ru:'НЕ берите белые такси — в 5 раз дороже. Uber с парковки.'},
{category:'money',severity:'warning',text_en:'ATMs: Banque Misr, NBE, CIB (EGP 20-30 fee). Currency exchange 10-12% markup. Egypt is cash-dependent — have EGP 500-1000 in small bills.',text_ru:'Банкоматы Banque Misr, NBE (20–30 фунтов). Египет — наличные.'},
{category:'wifi',severity:'info',text_en:'Free WiFi "CAI Free WiFi" — speed ~5 Mbps, requires phone number or passport scan. Not reliable. Better to buy "Orange" SIM at arrivals (EGP 150 with data).',text_ru:'WiFi «CAI Free WiFi» — ~5 Мбит/с. Купите SIM Orange (150 фунтов).'},

{category:'food',severity:'pro',text_en:'"Cilantro" cafe in T3 — coffee EGP 40 ($1.30), sandwich EGP 60. "Pizza Hut" — EGP 80. "McDonald\'s" — EGP 70. Avoid T1 restaurants.',text_ru:'Cilantro — кофе 40 фунтов ($1.30). McDonald\'s — 70 фунтов.'},
{category:'sleep',severity:'info',text_en:'CAI sleep: T3 near gate 8 (quiet, padded benches). T1 near gate 2 (limited). "Le Meridien" hotel connected to T3 — from $120. No sleep pods.',text_ru:'CAI: T3 у 8 (скамьи). T1 у 2 (ограничено). Le Meridien — от $120.'},
{category:'luggage',severity:'info',text_en:'Luggage storage in T3 arrivals — EGP 50-80/bag/24h ($2-3). T1 and T2 also have. Very cheap. Cash only.',text_ru:'Хранение в T3 — 50–80 фунтов/сумка/24ч. Очень дёшево.'},
{category:'scams',severity:'warning',text_en:'CAI is notorious for:"helpful" porters demanding EGP 200, taxi drivers claiming Uber not allowed, fake "customs" officials asking for "fines".',text_ru:'CAI: «помощники» просят 200 фунтов. Лже-таможенники штрафуют.'},

{category:'navigation',severity:'info',text_en:'CAI has T1 (old, some international), T2 (charter), T3 (new, main international). Free shuttle bus between terminals (15 min). T3 is modern.',text_ru:'CAI: T1 (старый), T2 (чартер), T3 (новый). Бесплатный автобус.'},
]},

{code:'CGK',city:'Jakarta',country:'Indonesia',countryRu:'Индонезия',flag:'🇮🇩',terminals:3,difficulty:4,continent:'asia',tips:[

{category:'transport',severity:'pro',text_en:'TransJakarta bus (Damri) from Soekarno-Hatta: IDR 50,000 to various hubs (Gambir, Kampung Rambutan). Cheapest option. Gojek/Grab from parking area — IDR 100,000-150,000.',text_ru:'Автобус Damri: 50,000 рупий до разных районов. Gojek/Grab с парковки — 100,000–150,000 рупий.'},
{category:'money',severity:'warning',text_en:'ATMs: BCA, Mandiri, BNI (IDR 50,000 fee). Currency exchange 12% markup — terrible rates. Exchange USD at city money changers (e.g., in Mangga Dua or Grand Indonesia).',text_ru:'Банкоматы BCA, Mandiri, BNI (50,000 рупий). Обменники в городе намного лучше.'},

{category:'charging',severity:'info',text_en:'CGK charging found in main terminal near gates C-D. Limited USB ports. Best spot: food court area in terminal 2. Bring power bank — outlets are scarce.',text_ru:'Зарядки в основном терминале у C-D. USB мало — берите пауэрбанк. Лучше у фуд-корта T2.'},
{category:'food',severity:'pro',text_en:'"Circle K" or "Alfamart" — snacks IDR 20,000 ($1.30). "Bakmi GM" — noodles IDR 60,000. "Solaria" — combo meals IDR 50,000. Avoid "Starbucks" (double price).',text_ru:'Circle K — снеки 20,000 рупий ($1.30). Bakmi GM — лапша 60,000 рупий. Solaria — комбо 50,000 рупий.'},
{category:'sleep',severity:'info',text_en:'CGK open 24h. Terminal 2 near gate D (padded benches, quieter). Terminal 3 is newer — better seating near gate 10. "Digital Airport Hotel" in T3 — from IDR 250,000 for 3h block.',text_ru:'CGK 24/7. T2 у D (скамьи). T3 новее — лучше места у 10. Цифровой отель в T3 — от 250,000 рупий за 3ч.'},
{category:'luggage',severity:'info',text_en:'Luggage storage in T2 and T3 arrivals — IDR 50,000-75,000/bag/24h ($3-5). "Titip Koper" service — IDR 40,000. Cash only (rupiah).',text_ru:'Хранение багажа в T2/T3 — 50,000–75,000 рупий/сумка/24ч. Только наличные.'},
{category:'scams',severity:'warning',text_en:'Classic Jakarta scam: "taxi blocked" — accomplice says taxi can\'t enter and directs you to expensive car. Airport "helpers" demand IDR 100,000 for carrying bag 50m.',text_ru:'«Такси не может подъехать» — перенаправляют к дорогому авто. «Помощники» просят 100,000 рупий.'},
{category:'immigration',severity:'info',text_en:'CGK: 20-40 min. Indonesia visa-free for many (now reinstated) or visa on arrival (IDR 500,000, 30 days). Have e-VOA code ready for faster processing.',text_ru:'CGK: 20–40 минут. Безвизово для многих или VOA (500,000 рупий, 30 дней).'},
{category:'navigation',severity:'info',text_en:'CGK has T1 (older), T2 (mixed), T3 (new, international). Free shuttle bus between terminals (15 min). Skytrain between T2-T3 (5 min). T3 is the modern hub.',text_ru:'CGK: T1 (старый), T2 (смешанный), T3 (новый). Бесплатный шаттл (15 мин). SkyTrain между T2-T3.'},
]},
{code:'TBS',city:'Tbilisi',country:'Georgia',countryRu:'Грузия',flag:'🇬🇪',terminals:1,difficulty:2,continent:'central-asia',tips:[

{category:'transport',severity:'warning',text_en:'Taxi drivers inside arrivals charge 3x. Order Bolt or Yandex Go from your phone while still in baggage claim. Official taxi stand at exit is overpriced.',text_ru:'Таксисты внутри прилёта — в 3 раза дороже. Закажите Bolt в телефоне ещё до выхода.'},
{category:'money',severity:'info',text_en:'ATMs: TBC Bank, Bank of Georgia (GEL 5-8 fee). Currency exchange 8% markup. Better to withdraw from ATM or exchange at city "Didube" bazaar.',text_ru:'Банкоматы TBC Bank, Bank of Georgia (5–8 лари). Лучше менять в городе.'},

{category:'sleep',severity:'info',text_en:'TBS open 24h (but quiet at night). Best spot: second floor near gate 2 (padded benches, dim lighting). "Tbilisi Airport Hotel" inside — from GEL 100. Limited sleeping options.',text_ru:'TBS 24/7 (ночью тихо). Второй этаж у 2 (скамьи). Отель внутри — от 100 лари.'},
{category:'luggage',severity:'info',text_en:'Luggage storage in arrivals hall — GEL 5-10/bag/24h ($2-4). Very cheap. Lockers available GEL 5. Cash only.',text_ru:'Хранение в зале прилёта — 5–10 лари/сумка/24ч. Очень дёшево. Только наличные.'},
{category:'scams',severity:'info',text_en:'TBS generally safe. Main issue: taxi overcharging. Some currency exchange short-changing. Bolt/Yandex solves taxi problem completely.',text_ru:'TBS безопасен. Такси — главная проблема. Bolt решает.'},
{category:'immigration',severity:'pro',text_en:'TBS: 10-20 min. Georgia has visa-free entry for most nationalities (365 days!). Very fast and friendly. No visa questions for most travelers.',text_ru:'TBS: 10–20 минут. Грузия — безвизово на 365 дней! Очень быстро.'},
{category:'navigation',severity:'pro',text_en:'TBS has one terminal — very small and easy to navigate. Check-in counters visible from entrance. Departures upstairs, arrivals downstairs. 5 min end-to-end.',text_ru:'TBS — один терминал, очень маленький. Всё в 5 минутах ходьбы.'},

<script>
// ============================================================
// APP STATE & UTILITIES
// ============================================================
let lang = localStorage.getItem('ti-lang') || 'en';
let soundOn = localStorage.getItem('ti-sound') === 'true';
let savedTips = JSON.parse(localStorage.getItem('ti-saved') || '[]');
let recentSearches = JSON.parse(localStorage.getItem('ti-recent') || '[]');
let currentAirport = null;
let currentContinent = 'all';
let currentCategory = 'all';
let currentScreen = 'home';

function t(key) { return T[lang][key] || key; }
function getText(obj) { return lang==='en'?obj.text_en:obj.text_ru; }
function getCountry(airport) { return lang==='en'?airport.country:airport.countryRu; }

// Sound Engine (Web Audio API)
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(name) {
  if (!soundOn) return;
  initAudio();
  const ctx = audioCtx;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  gain.gain.value = 0.08;
  if (name==='ding') { osc.frequency.value=880; osc.type='sine'; gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3); osc.start(); osc.stop(ctx.currentTime+0.3); }
  if (name==='whoosh') { osc.frequency.value=200; osc.type='sawtooth'; gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2); osc.start(); osc.stop(ctx.currentTime+0.2); }
  if (name==='click') { osc.frequency.value=660; osc.type='sine'; gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1); osc.start(); osc.stop(ctx.currentTime+0.1); }
}

// Global state init
document.addEventListener('DOMContentLoaded', () => {
  initAudio();
  applyLanguage();
  renderContinentFilter();
  renderHome();
  renderPopularSearches();
  updateSaved();
  updateSoundUI();
  updateLangButtons();
  
  // Home search
  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (q.length > 0) { showSearchScreenFromHome(q); }
    else { renderHome(); }
  });
  
  // Search screen
  document.getElementById('search-input-lg').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (q.length > 0) performSearch(q);
    else document.getElementById('search-results').innerHTML = '';
  });
  
  document.getElementById('search-cancel-btn').addEventListener('click', () => { switchScreen('home'); });
  
  // Back button
  document.getElementById('back-btn').addEventListener('click', () => { switchScreen('home'); });
  
  // Bottom nav
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const scr = item.dataset.screen;
      if (scr === 'language') { toggleLang(); return; }
      switchScreen(scr);
    });
  });
  
  // Continent filter
  document.getElementById('continent-filter').addEventListener('click', (e) => {
    const chip = e.target.closest('.continent-chip');
    if (!chip) return;
    document.querySelectorAll('.continent-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentContinent = chip.dataset.continent;
    renderHome();
  });
  
  // Lang buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.lang === lang) return;
      lang = btn.dataset.lang;
      localStorage.setItem('ti-lang', lang);
      applyLanguage();
      updateLangButtons();
      playSound('whoosh');
      renderHome();
      if (currentAirport) renderAirportDetail(currentAirport.code);
    });
  });
  
  // Sound toggle
  document.getElementById('sound-toggle').addEventListener('click', () => {
    soundOn = !soundOn;
    localStorage.setItem('ti-sound', soundOn);
    updateSoundUI();
    if (soundOn) playSound('click');
  });
  
  // Clear saved
  document.getElementById('clear-saved-btn').addEventListener('click', () => {
    if (confirm(lang==='en'?'Clear all saved tips?':'Удалить все сохранённые советы?')) {
      savedTips = [];
      localStorage.setItem('ti-saved', '[]');
      updateSaved();
      playSound('click');
    }
  });
});

function applyLanguage() {
  document.getElementById('disclaimer-text').textContent = t('disclaimer');
  document.getElementById('saved-title').textContent = t('saved-title');
  document.getElementById('search-input').placeholder = t('search-placeholder');
  document.getElementById('search-input-lg').placeholder = t('search-placeholder-lg');
  document.getElementById('search-cancel-btn').textContent = t('search-cancel');
  document.getElementById('clear-saved-btn').textContent = t('clear-all');
  const empty = document.getElementById('saved-empty');
  empty.querySelector('h3').textContent = t('saved-empty-title');
  empty.querySelector('p').textContent = t('saved-empty-text');
  document.querySelectorAll('[data-tkey]').forEach(el => {
    el.textContent = t(el.dataset.tkey);
  });
  renderPopularSearches();
}

function updateLangButtons() {
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}

function updateSoundUI() {
  document.getElementById('sound-toggle').textContent = soundOn ? '🔊' : '🔇';
  document.getElementById('sound-toggle').title = soundOn ? t('sound-on') : t('sound-off');
}

// ============================================================
// SCREEN ROUTER
// ============================================================
function switchScreen(screen, data) {
  const screens = ['home','airport','search','saved'];
  const currentEl = document.getElementById(`screen-${currentScreen}`);
  if (currentScreen !== 'home' && currentScreen === screen) {
    if (screen==='airport') { if (data && data.code === currentAirport?.code) return; }
    else return;
  }
  screens.forEach(s => {
    const el = document.getElementById(`screen-${s}`);
    if (!el) return;
    el.classList.remove('active');
    el.style.display = 'none';
  });
  
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.screen === screen));
  
  currentScreen = screen;
  const target = document.getElementById(`screen-${screen}`);
  if (target) {
    target.style.display = 'block';
    // Trigger reflow for animation
    void target.offsetWidth;
    target.classList.remove('screen-enter');
    // Remove and re-add for animation
    target.classList.add('active');
    target.classList.add('fadeIn');
  }
  
  // Show/hide search bar & continent filter
  document.getElementById('search-bar').style.display = screen==='home'?'block':'none';
  document.getElementById('continent-filter').style.display = screen==='home'?'flex':'none';
  
  if (screen === 'saved') updateSaved();
  if (screen === 'search') {
    const slg = document.getElementById('search-input-lg');
    slg.value = '';
    slg.focus();
    document.getElementById('search-results').innerHTML = '';
  }
  if (screen === 'airport' && data) renderAirportDetail(data.code || data);
  if (screen === 'home') { currentAirport = null; renderHome(); }
  
  window.scrollTo({top:0,behavior:'smooth'});
  playSound('whoosh');
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================
function renderContinentFilter() {
  const container = document.getElementById('continent-filter');
  container.innerHTML = '';
  const contKeys = ['all','americas','europe','asia','middle-east','africa-oceania','central-asia'];
  contKeys.forEach(key => {
    const chip = document.createElement('button');
    chip.className = `continent-chip ${key === currentContinent ? 'active' : ''}`;
    chip.dataset.continent = key;
    chip.textContent = continentNames[lang][key] || continentNames.en[key];
    container.appendChild(chip);
  });
}

function renderHome(filterContinent) {
  const grid = document.getElementById('airport-grid');
  const searchVal = document.getElementById('search-input').value.trim().toLowerCase();
  
  let filtered = airports;
  
  // Continent filter
  if (currentContinent !== 'all') {
    filtered = filtered.filter(a => a.continent === currentContinent);
  }
  
  // Search filter
  if (searchVal.length > 0) {
    filtered = filtered.filter(a => 
      a.code.toLowerCase().includes(searchVal) || 
      a.city.toLowerCase().includes(searchVal) || 
      a.country.toLowerCase().includes(searchVal) ||
      a.countryRu.toLowerCase().includes(searchVal)
    );
  }
  
  if (filtered.length === 0 && searchVal.length === 0) {
    grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px 0;grid-column:1/-1">No airports found</p>';
    return;
  }
  
  grid.innerHTML = '';
  filtered.forEach((airport, i) => {
    const card = document.createElement('div');
    card.className = 'airport-card';
    card.style.animationDelay = `${i * 30}ms`;
    card.innerHTML = `
      <div class="flag">${airport.flag}</div>
      <div class="code">${airport.code}</div>
      <div class="city">${airport.city}</div>
      <div class="country">${getCountry(airport)}</div>
      
    `;
    card.addEventListener('click', () => {
      playSound('ding');
      switchScreen('airport', airport);
    });
    grid.appendChild(card);
  });
  
  // Update stress dot colors
  grid.querySelectorAll('.airport-card').forEach((card, idx) => {
    const dots = card.querySelectorAll('.stress-dot.filled');
    const stress = filtered[idx].difficulty;
    dots.forEach((dot, di) => {
      if (di < stress) {
        if (stress <= 2) dot.classList.add('easy');
        else if (stress <= 3) dot.classList.add('medium');
        else dot.classList.add('hard');
      }
    });
  });
}

function renderAirportDetail(code) {
  const airport = airports.find(a => a.code === code);
  if (!airport) { switchScreen('home'); return; }
  currentAirport = airport;
  
  // Hero
  document.getElementById('airport-hero').innerHTML = `
    <div class="flag">${airport.flag}</div>
    <div class="code">${airport.code}</div>
    <div class="location">${airport.city}, ${getCountry(airport)}</div>
    <div class="quick-info">
      <span class="quick-chip">${airport.terminals} ${t('terminals')}</span>
      <span class="quick-chip">${'●'.repeat(airport.difficulty)}${'○'.repeat(5-airport.difficulty)} ${t('difficulty')}</span>
      <span class="quick-chip">${airport.tips.length} ${t('tips')}</span>
    </div>
  `;
  document.getElementById('airport-header-title').textContent = airport.code;
  
  // Category filter
  currentCategory = 'all';
  renderCategoryFilter(airport);
  
  // Tips
  renderTips(airport, 'all');
}

function renderCategoryFilter(airport) {
  const container = document.getElementById('category-filter');
  container.innerHTML = '';
  const cats = ['all',...new Set(airport.tips.map(t => t.category))];
  cats.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = `cat-chip ${cat === currentCategory ? 'active' : ''}`;
    chip.dataset.cat = cat;
    chip.textContent = catNames[lang][cat] || cat;
    if (cat !== 'all' && categoryIcons[cat]) {
      chip.innerHTML = `${categoryIcons[cat]} ${catNames[lang][cat] || cat}`;
    }
    container.appendChild(chip);
  });
  
  container.addEventListener('click', (e) => {
    const chip = e.target.closest('.cat-chip');
    if (!chip) return;
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentCategory = chip.dataset.cat;
    renderTips(airport, currentCategory);
  });
}

function renderTips(airport, category) {
  const list = document.getElementById('tips-list');
  let tips = airport.tips;
  if (category !== 'all') tips = tips.filter(t => t.category === category);
  
  if (tips.length === 0) {
    list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">' + t('no-results') + '</p>';
    return;
  }
  
  list.innerHTML = '';
  tips.forEach((tip, i) => {
    const savedId = `${airport.code}_${i}`;
    const isSaved = savedTips.includes(savedId);
    const text = getText(tip);
    const isLong = text.length > 150;
    
    const card = document.createElement('div');
    card.className = 'tip-card';
    card.style.animationDelay = `${i * 50}ms`;
    card.innerHTML = `
      <div class="severity-bar ${tip.severity}"></div>
      <div class="tip-header">
        <div class="tip-category">
          <span class="icon">${categoryIcons[tip.category] || '📌'}</span>
          ${catNames[lang][tip.category] || tip.category}
        </div>
        <button class="save-btn ${isSaved ? 'saved' : ''}" data-id="${savedId}">${isSaved ? '❤️' : '🤍'}</button>
      </div>
      <div class="tip-text ${isLong ? 'expandable' : ''}" data-expanded="false">${text}</div>
      ${isLong ? `<button class="tip-expand-hint">${t('tap-expand')}</button>` : ''}
    `;
    
    // Save toggle
    card.querySelector('.save-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      const id = this.dataset.id;
      const idx = savedTips.indexOf(id);
      if (idx > -1) {
        savedTips.splice(idx, 1);
        this.classList.remove('saved');
        this.textContent = '🤍';
      } else {
        savedTips.push(id);
        this.classList.add('saved', 'animate');
        this.textContent = '❤️';
        setTimeout(() => this.classList.remove('animate'), 400);
      }
      localStorage.setItem('ti-saved', JSON.stringify(savedTips));
      playSound('click');
    });
    
    // Expand long tip
    if (isLong) {
      const textEl = card.querySelector('.tip-text');
      const hint = card.querySelector('.tip-expand-hint');
      hint.addEventListener('click', (e) => {
        e.stopPropagation();
        const expanded = textEl.dataset.expanded === 'true';
        textEl.classList.toggle('expanded', !expanded);
        textEl.dataset.expanded = !expanded;
        hint.textContent = expanded ? t('tap-expand') : t('tap-collapse');
      });
    }
    
    list.appendChild(card);
    
    // Stagger entrance
    setTimeout(() => card.classList.add('show'), i * 50);
  });
}

// ============================================================
// SEARCH
// ============================================================
function showSearchScreenFromHome(query) {
  switchScreen('search');
  const slg = document.getElementById('search-input-lg');
  slg.value = query;
  performSearch(query);
}

function performSearch(query) {
  const results = document.getElementById('search-results');
  if (!query || query.length < 1) { results.innerHTML = ''; return; }
  
  // Add to recent
  if (!recentSearches.includes(query)) {
    recentSearches.unshift(query);
    if (recentSearches.length > 5) recentSearches.pop();
    localStorage.setItem('ti-recent', JSON.stringify(recentSearches));
  }
  
  const q = query.toLowerCase();
  
  // Search airports
  const airportResults = airports.filter(a => 
    a.code.toLowerCase().includes(q) ||
    a.city.toLowerCase().includes(q) ||
    a.country.toLowerCase().includes(q)
  );
  
  // Search tips
  const tipResults = [];
  airports.forEach(a => {
    a.tips.forEach((tip, i) => {
      const text = getText(tip).toLowerCase();
      if (text.includes(q)) {
        tipResults.push({ airport: a, tip, tipIndex: i });
      }
    });
  });
  
  let html = '';
  if (airportResults.length > 0) {
    html += `<div class="search-section-title">${t('search-results-airports')} (${airportResults.length})</div>`;
    airportResults.forEach(a => {
      html += `<div class="search-result-item" data-code="${a.code}">
        <div class="result-title">${a.flag} ${a.code} — ${a.city}, ${getCountry(a)}</div>
        <div class="result-sub">${a.tips.length} ${t('tips')}</div>
      </div>`;
    });
  }
  
  if (tipResults.length > 0) {
    html += `<div class="search-section-title">${t('search-results-tips')} (${tipResults.length})</div>`;
    tipResults.forEach((r, i) => {
      if (i > 20) return;
      const text = getText(r.tip);
      html += `<div class="search-result-item" data-code="${r.airport.code}" data-tip="${r.tipIndex}">
        <div class="result-title">${r.airport.flag} ${r.airport.code}: ${r.airport.city}</div>
        <div class="result-preview">${text.substring(0, 100)}...</div>
      </div>`;
    });
  }
  
  if (!html) {
    html = `<p style="color:var(--text-muted);text-align:center;padding:20px">${t('no-results')}</p>`;
  }
  
  results.innerHTML = html;
  
  // Click handlers
  results.querySelectorAll('.search-result-item').forEach(el => {
    el.addEventListener('click', () => {
      const code = el.dataset.code;
      playSound('ding');
      switchScreen('airport', {code});
    });
  });
}

function renderPopularSearches() {
  const container = document.getElementById('popular-searches');
  const popularTerms = ['taxi','wifi','sleep','food','scam','free wifi','cheap'];
  let html = '';
  if (recentSearches.length > 0) {
    html += `<span style="color:var(--text-muted);font-size:12px;padding:4px 0">${t('recent-searches')}:</span>`;
    recentSearches.forEach(s => {
      html += `<button class="popular-tag" data-q="${s}">${s}</button>`;
    });
  }
  html += `<span style="color:var(--text-muted);font-size:12px;padding:4px 0">${t('popular-searches')}:</span>`;
  popularTerms.forEach(s => {
    html += `<button class="popular-tag" data-q="${s}">${s}</button>`;
  });
  container.innerHTML = html;
  
  container.querySelectorAll('.popular-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const q = tag.dataset.q;
      document.getElementById('search-input-lg').value = q;
      performSearch(q);
      playSound('click');
    });
  });
}

// ============================================================
// SAVED TIPS
// ============================================================
function updateSaved() {
  const list = document.getElementById('saved-list');
  const empty = document.getElementById('saved-empty');
  const header = document.getElementById('saved-header');
  
  if (savedTips.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  
  // Group by airport
  const grouped = {};
  savedTips.forEach(id => {
    const [code, idx] = id.split('_');
    if (!grouped[code]) grouped[code] = [];
    grouped[code].push(parseInt(idx));
  });
  
  let html = '';
  Object.keys(grouped).sort().forEach(code => {
    const airport = airports.find(a => a.code === code);
    if (!airport) return;
    html += `<div class="saved-group"><div class="saved-group-title">${airport.flag} ${airport.code} — ${airport.city}</div>`;
    grouped[code].forEach(idx => {
      const tip = airport.tips[idx];
      if (!tip) return;
      const text = getText(tip);
      html += `<div class="tip-card" style="margin-bottom:8px">
        <div class="severity-bar ${tip.severity}"></div>
        <div class="tip-header">
          <div class="tip-category"><span class="icon">${categoryIcons[tip.category]||'📌'}</span>${catNames[lang][tip.category]||tip.category}</div>
        </div>
        <div class="tip-text" style="font-size:14px">${text}</div>
      </div>`;
    });
    html += '</div>';
  });
  list.innerHTML = html;
}
</script>
